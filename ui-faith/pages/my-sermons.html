<div class="sermon-container">

  <!-- ===================================== -->
  <!-- BACK -->
  <!-- ===================================== -->
  <div class="back-bar">

    <button
      onclick="navigate('dashboard')"
      class="btn-back"
    >
      ← Back to Dashboard
    </button>

  </div>

  <!-- ===================================== -->
  <!-- HEADER -->
  <!-- ===================================== -->
  <div class="page-header sermon-header">

    <div class="sermon-header-left">

      <h1>
        📚 My Sermons
      </h1>

      <p class="subtext">
        View, edit, search, and manage your saved sermons
      </p>

    </div>

    <div class="sermon-header-right">

      <button
        class="btn-primary"
        onclick="navigate('sermon')"
      >
        ✨ Create New Sermon
      </button>

    </div>

  </div>

  <!-- ===================================== -->
  <!-- STATS BAR -->
  <!-- ===================================== -->
  <div class="sermon-stats">

    <div class="feature-card mini-stat">

      <h3 id="sermonCount">
        0
      </h3>

      <p>
        Saved Sermons
      </p>

    </div>

    <div class="feature-card mini-stat">

      <h3 id="sharedCount">
        0
      </h3>

      <p>
        Shared With Me
      </p>

    </div>

  </div>
 

  <!-- ===================================== -->
    <!-- TABS -->
    <!-- ===================================== -->
    <div class="sermon-tabs">

      <button
        id="tabMine"
        class="sermon-tab active"
      >
        📚 My Sermons
      </button>

      <button
        id="tabShared"
        class="sermon-tab"
      >
        🤝 Shared With Me
      </button>

    </div>
  <!-- ===================================== -->
  <!-- SEARCH BAR -->
  <!-- ===================================== -->
  <div class="sermon-toolbar">

    <input
      id="sermonSearch"
      class="search-input"
      type="text"
      placeholder="🔍 Search sermons..."
    />
    <div
      id="searchResultsCount"
      class="search-count"
    ></div>
    <select
      id="sermonSort"
      class="sort-select"
    >

      <option value="newest">
            Newest First
            </option>

            <option value="oldest">
            Oldest First
            </option>

            <option value="title">
            Title A-Z
            </option>

            <option value="mostViewed">
            Most Viewed
            </option>

            <option value="mostShared">
            Most Shared
        </option>

    </select>

  </div>

  <!-- ===================================== -->
  <!-- SERMON LIBRARY -->
  <!-- ===================================== -->
  <div class="library-wrapper">

    <div
      id="sermonList"
      class="sermons-grid"
    >

      <div class="loading-state">

        <div class="loading-spinner"></div>

        <p>
          Loading sermons...
        </p>

      </div>

    </div>

  </div>

  <!-- ===================================== -->
  <!-- EMPTY STATE -->
  <!-- ===================================== -->
  <div
    id="emptyState"
    class="empty-state"
    style="display:none;"
  >

    <h3>
      No sermons yet
    </h3>

    <p>
      Start by creating your first sermon 🙏
    </p>

    <button
      class="btn-primary"
      onclick="navigate('sermon')"
    >
      ✨ Create Sermon
    </button>

  </div>

  <!-- ===================================== -->
<!-- SHARED SECTION -->
<!-- ===================================== -->

<div id="sharedSection">

  <div
    class="page-header"
    style="margin-top:40px;"
  >

    <h2>
      🤝 Shared With Me
    </h2>

    <p class="subtext">
      Sermons shared by other pastors
    </p>

  </div>

  <div
    id="sharedList"
    class="sermons-grid"
  >

    <div class="loading-state">

      <div class="loading-spinner"></div>

      <p>
        Loading shared sermons...
      </p>

    </div>

  </div>

</div>

  

</div>
