<div class="sermon-container">

  <!-- 🔥 BACK -->
  <div class="back-bar">
    <button
      onclick="navigate('dashboard')"
      class="btn-back"
    >
      ← Back to Dashboard
    </button>
  </div>

  <!-- ========================= -->
  <!-- HEADER -->
  <!-- ========================= -->
  <div class="page-header">

    <h1>
      📚 My Sermons
    </h1>

    <p class="subtext">
      View, edit, and manage your saved sermons
    </p>

  </div>

  <!-- ========================= -->
  <!-- ACTION BAR -->
  <!-- ========================= -->
  <div class="top-actions">

    <button
      class="btn-primary"
      onclick="navigate('sermon')"
    >
      ✨ Create New Sermon
    </button>

  </div>

  <!-- ========================= -->
  <!-- MY SERMONS -->
  <!-- ========================= -->
  <div
    id="mySermonsList"
    class="sermons-grid"
  >

    <!-- LOADING STATE -->
    <div class="loading-state">

      <div class="loading-spinner"></div>

      <p>
        Loading sermons...
      </p>

    </div>

  </div>

  <!-- ========================= -->
  <!-- EMPTY STATE -->
  <!-- ========================= -->
  <div
    id="emptyState"
    class="empty-state"

    style="display:none;"
  >

    <h3>
      No sermons yet
    </h3>

    <p>
      Start by creating your first sermon 🙏
    </p>

    <button
      class="btn-primary"
      onclick="navigate('sermon')"
    >
      ✨ Create Sermon
    </button>

  </div>

  <!-- ========================= -->
  <!-- SHARED SERMONS -->
  <!-- ========================= -->
  <div
    class="page-header"

    style="
      margin-top:40px;
    "
  >

    <h2>
      🤝 Shared With Me
    </h2>

    <p class="subtext">
      Sermons shared by other pastors
    </p>

  </div>

  <!-- ========================= -->
  <!-- SHARED LIST -->
  <!-- ========================= -->
  <div
    id="sharedList"
    class="sermons-grid"
  >

    <div class="loading-state">

      <div class="loading-spinner"></div>

      <p>
        Loading shared sermons...
      </p>

    </div>

  </div>

</div>
