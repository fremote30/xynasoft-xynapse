<div class="app clean-app">

  <div class="clean-main">

    <!-- =========================
         HERO
    ========================== -->
    <section class="simple-hero">

      <div class="hero-content">

        <h1 class="hero-title">

          <span
            class="highlight"
            id="pastorName"
          >
            Pastor
          </span>

        </h1>

        <p
          class="hero-sub"
          id="pastorBio"
        >
          Ministry profile
        </p>

        <div class="hero-buttons">

          <button
            id="followBtn"
            class="btn-primary"
          >
            Follow
          </button>

        </div>

      </div>

    </section>

    <!-- =========================
         PROFILE INFO
    ========================== -->
    <section class="features">

      <div class="features-header">

        <h2>Ministry Information</h2>

      </div>

      <div class="feature-grid">

        <div class="feature-card">

          <h3>Church</h3>

          <p id="churchNameView">
            —
          </p>

        </div>

        <div class="feature-card">

          <h3>Ministry Focus</h3>

          <p id="ministryFocusView">
            —
          </p>

        </div>

        <div class="feature-card">

          <h3>Location</h3>

          <p id="locationView">
            —
          </p>

        </div>

        <div class="feature-card">

          <h3>Followers</h3>

          <p id="followersView">
            0
          </p>

        </div>

      </div>

    </section>

    <!-- =========================
         SERMONS
    ========================== -->
    <section class="features">

      <div class="features-header">

        <h2>Recent Sermons</h2>

      </div>

      <div
        id="pastorSermons"
        class="feed-grid"
      >

        <p>Loading sermons...</p>

      </div>

    </section>

  </div>

</div>
