<div class="app clean-app">

  <div class="clean-main">

    <!-- =========================
         HERO
    ========================== -->
    <section class="simple-hero">

      <div class="hero-content">

        <h1 class="hero-title">
          Edit Your
          <span class="highlight">
            Ministry Profile
          </span>
        </h1>

        <p class="hero-sub">
          Customize your public ministry identity on XynaFaith.
        </p>

      </div>

    </section>

    <!-- =========================
         PROFILE FORM
    ========================== -->
    <section class="features">

      <div class="features-header">

        <h2>Pastor Profile</h2>

        <p>
          This information will appear on your public pastor page.
        </p>

      </div>

      <div class="feature-card">

        <form id="profileForm">

          <div class="form-group">
            <label>Bio</label>

            <textarea
              id="profileBio"
              rows="5"
              placeholder="Tell people about your ministry..."
            ></textarea>
          </div>

          <div class="form-group">
            <label>Church Name</label>

            <input
              type="text"
              id="churchName"
              placeholder="Enter church name"
            >
          </div>

          <div class="form-group">
            <label>Ministry Focus</label>

            <input
              type="text"
              id="ministryFocus"
              placeholder="Prayer, Youth, Healing..."
            >
          </div>

          <div class="form-group">
            <label>Location</label>

            <input
              type="text"
              id="profileLocation"
              placeholder="City, Country"
            >
          </div>

          <div class="form-group">
            <label>Website</label>

            <input
              type="text"
              id="profileWebsite"
              placeholder="https://..."
            >
          </div>

          <button
            type="submit"
            class="btn-primary"
          >
            Save Profile
          </button>

        </form>

      </div>

    </section>

  </div>

</div>
