<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XynaFaith</title>
  <link rel="stylesheet" href="/faith/styles.css" />
</head>

<body>

  <!-- =========================
     NAVBAR
========================== -->
<header class="navbar">

  <!-- LEFT SIDE: Logo + Brand -->
  <div class="nav-left">
    <img src="/faith/assets/xynafaith.png" class="logo" alt="XynaFaith Logo" />
    <div class="brand">
      <div class="brand-title">XynaFaith</div>
      <div class="brand-sub">
        Powered by AI • Guided by Scripture • Led by Pastors
      </div>
    </div>
  </div>

  <!-- MOBILE MENU BUTTON -->
  <button
    id="mobileMenuBtn"
    class="mobile-menu-btn"
    onclick="toggleMobileMenu()"
    aria-label="Toggle Navigation"
  >
    ☰
  </button>

  <button
    id="notificationBell"
    class="notification-bell hidden"
    onclick="togglePrayerNotifications()"
    title="Notifications"
  >
    🔔
    <span id="notificationBadge" class="notification-badge hidden">0</span>
  </button>
  <!-- DYNAMIC NAVIGATION -->
  <nav id="topnav" class="nav-links"></nav>

</header>

<!-- MOBILE DRAWER -->
<nav id="mobileDrawer" class="mobile-drawer">
  <div class="mobile-drawer-header">
    <div class="brand-title">XynaFaith</div>
    <div class="mobile-drawer-user">
      <span id="mobileDrawerUserName">Guest</span>
      <span id="mobileDrawerUserRole"></span>
    </div>
  </div>

  <div class="mobile-drawer-links">
    <button onclick="navigate('home')">🏠 Home</button>
    <button onclick="navigate('dashboard')">📊 Dashboard</button>
    <button onclick="navigate('sermon')">✍️ Sermon Studio</button>
    <button onclick="navigate('mysermons')">📚 My Sermons</button>
    <button onclick="navigate('network')">🌐 Network</button>
    <button onclick="navigate('prayer')">🙏 Prayer Wall</button>
    <button onclick="navigate('settings')">⚙️ Settings</button>
    <button onclick="logout()">🧱 Logout</button>
  </div>
</nav>
  <!-- =========================
       SPA CONTENT
  ========================== -->
  <main id="app"></main>

  <!-- =========================
       FOOTER
  ========================== -->
<footer class="footer">

  <div class="footer-brand">
    © 2026 XynaFaith. All rights reserved.
  </div>

  <div class="footer-tagline">
    Powered by AI • Guided by Scripture • Led by Pastors
  </div>

  <div class="footer-links">

    <a
      href="https://xynasoft.com"
      target="_blank"
    >
      A Xynasoft Platform
    </a>

    <span>•</span>

    <a
      href="mailto:support@xynafaith.com"
    >
      Contact Us
    </a>

    <span>•</span>

    <a
      href="#"
      onclick="showAIDisclaimer()"
    >
      AI Disclaimer
    </a>

  </div>

</footer>

  <!-- =========================
       EXTERNAL LIBRARIES
  ========================== -->
  <script defer src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <!-- =========================
       UTILITIES
  ========================== -->
  <script defer src="/faith/js/utils/storage.js"></script>
  <script defer src="/faith/js/utils/toast.js"></script>
  <script defer src="/faith/js/utils/modal.js"></script>
  <script defer src="/faith/js/utils/loader.js"></script>
  <script defer src="/faith/js/utils/auth.js"></script>

  <!-- =========================
       CORE
  ========================== -->
  <script defer src="/faith/js/router.js"></script>
  <script defer src="/faith/js/core.js"></script>

  <!-- =========================
       FEATURE MODULES
  ========================== -->
  <script defer src="/faith/js/dashboard.js"></script>
  <script defer src="/faith/js/admin.js"></script>
  <script defer src="/faith/js/sermon.js"></script>
  <script defer src="/faith/js/collaboration.js"></script>
  <script defer src="/faith/js/network.js"></script>
  <script defer src="/faith/js/platform.js"></script>
  <script defer src="/faith/js/prayer.js"></script>

  <!-- =========================
       RECOVERY
  ========================== -->
  <script defer src="/faith/js/recovery.js"></script>

  <!-- =========================
       ERROR HANDLER
  ========================== -->
  <script defer src="/faith/js/error-handler.js"></script>

  <!-- =========================
       APP BOOTSTRAP
  ========================== -->
  <script defer src="/faith/js/app.js"></script>

</body>
</html>
